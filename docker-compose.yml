# ╔══════════════════════════════════════════════════════════════════╗
# ║          TRANSCODARR — Portainer Stack (Main Node)              ║
# ║                                                                  ║
# ║  Paste this in Portainer → Stacks → Add Stack → Web editor      ║
# ╚══════════════════════════════════════════════════════════════════╝

version: "3.9"

services:
  transcodarr-main:
    build:
      context: .
      dockerfile: Dockerfile
      # To force a clean rebuild (bypass Docker's layer cache), redeploy with:
      #   CACHE_BUST=$(date +%s) docker compose up --build
      # or in Portainer: set build arg CACHE_BUST to any new value before redeploying.
      args:
        CACHE_BUST: ${CACHE_BUST:-3}
    container_name: transcodarr-main
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_NAME=Transcodarr Main
      - PORT=3001
      - TZ=Asia/Kolkata
    volumes:
      # ── Config & database (persists across restarts) ──────────────
      - transcodarr-config:/root/.transcodarr

      # ── Your media library ────────────────────────────────────────
      # Host path → Container path
      # In Transcodarr Settings, use the container path (e.g. /media)
      - /mnt/dietpi_userdata/data/media:/media:ro

      # Add more if needed:
      # - /mnt/usb_drive:/mnt/usb:ro

volumes:
  transcodarr-config:
