# Transcodarr — Portainer Stack
# Deploy via: Stacks → Add Stack → Repository tab → enter GitHub URL

version: "3.9"

services:
  transcodarr-main:
    build:
      context: .
      dockerfile: Dockerfile.main
    container_name: transcodarr-main
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_NAME=Transcodarr Main
      - MAIN_PORT=3001
    volumes:
      - transcodarr-config:/root/.transcodarr
      - /mnt/dietpi_userdata/data/media:/media:ro
      # Add more media paths here if needed:
      # - /mnt/usb_drive:/mnt/usb:ro

volumes:
  transcodarr-config:
