<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1025"/>
      <stop offset="100%" style="stop-color:#0d0d0f"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Play triangle (shifted slightly left to visually center with the bars) -->
  <polygon points="7,8 7,24 19,16" fill="url(#icon)" filter="url(#glow)"/>

  <!-- Two compression / waveform bars on the right -->
  <rect x="22" y="10" width="3" height="12" rx="1.5" fill="url(#icon)" opacity="0.9"/>
  <rect x="27" y="13" width="3" height="6"  rx="1.5" fill="url(#icon)" opacity="0.6"/>
</svg>
