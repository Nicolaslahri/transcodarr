name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_MAIN: ghcr.io/${{ github.repository_owner }}/transcodarr-main
  IMAGE_WORKER: ghcr.io/${{ github.repository_owner }}/transcodarr-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for ARM64 / Pi 5 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Main node ──────────────────────────────────────────────────────────────
      - name: Build & push Main image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.main
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_MAIN }}:latest
            ${{ env.IMAGE_MAIN }}:${{ github.sha }}
          # This label links the package to the public repo → GHCR makes it public automatically
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Transcodarr Main Node
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Worker node ────────────────────────────────────────────────────────────
      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Transcodarr Worker Node
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
